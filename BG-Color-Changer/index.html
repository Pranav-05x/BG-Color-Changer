<!DOCTYPE html>
<html>
    <head>
        <title>BG-Changer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="colors">
            <button class="button-1" id="red">Red</button>
            <button class="button-2" id="yellow">Yellow</button>
            <button class="button-3" id="orange">Orange</button>
            <button class="button-4" id="green">Green</button>
            <button class="button-5" id="blue">Blue</button>
            <button class="button-6" id="pink">Pink</button>
            <button class="button-7" id="default">Default</button>
            <input type="text" id="color-input" placeholder="Enter a color...">
            <button class="button-8" id="apply">Apply</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
